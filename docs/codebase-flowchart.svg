<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1780" viewBox="0 0 1800 1780" role="img" aria-labelledby="title desc">
  <title id="title">drift codebase flowchart</title>
  <desc id="desc">The active trackpad pipeline, listener decision flow, frontend state, and dormant Quick Actions files.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111426"/>
      <stop offset="0.42" stop-color="#0c0d12"/>
      <stop offset="1" stop-color="#10131b"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#102c4b"/><stop offset="1" stop-color="#171a25"/>
    </linearGradient>
    <linearGradient id="purpleCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2b1d49"/><stop offset="1" stop-color="#181a25"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#113126"/><stop offset="1" stop-color="#181a24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".26"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#687086"/>
    </marker>
    <style>
      .section { fill:#141620; stroke:#34384a; stroke-width:1.5; }
      .card { stroke-width:1.5; filter:url(#shadow); }
      .blue { fill:url(#blueCard); stroke:#366da5; }
      .purple { fill:url(#purpleCard); stroke:#7454a8; }
      .green { fill:url(#greenCard); stroke:#3d825f; }
      .grey { fill:#20222a; stroke:#626879; stroke-width:1.5; stroke-dasharray:8 7; }
      .title { fill:#f4f5f9; font:700 44px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; letter-spacing:-1px; }
      .subtitle { fill:#aeb4c4; font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .sectionTitle { fill:#f0f1f7; font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .eyebrow { font:800 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; letter-spacing:1.5px; }
      .blueText { fill:#66a7ff; } .purpleText { fill:#b48cff; } .greenText { fill:#68d9a0; } .greyText { fill:#a1a6b5; }
      .cardTitle { fill:#f3f4f8; font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .file { fill:#b5bac9; font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace; }
      .body { fill:#cbd0dc; font:400 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .small { fill:#aeb4c4; font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .badge { fill:#68d9a0; font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .connector { fill:none; stroke:#687086; stroke-width:2; marker-end:url(#arrow); }
      .bus { fill:none; stroke:#4c5264; stroke-width:2; }
      .decisionTitle { fill:#e8dcff; font:700 13px ui-monospace,SFMono-Regular,Menlo,monospace; }
    </style>
  </defs>

  <rect width="1800" height="1780" fill="url(#bg)"/>
  <text x="70" y="78" class="title">drift codebase flowchart</text>
  <text x="70" y="112" class="subtitle">What runs today, how files communicate, and what remains compiled but disconnected</text>
  <rect x="1440" y="55" width="290" height="46" rx="23" fill="#102b22" stroke="#3d825f"/>
  <text x="1585" y="84" text-anchor="middle" class="badge">NO GESTURES REGISTERED</text>

  <!-- Active path -->
  <rect x="45" y="145" width="1710" height="715" rx="26" class="section"/>
  <text x="72" y="190" class="sectionTitle">1. Active runtime path</text>
  <text x="72" y="217" class="subtitle">The frame is borrowed in C, owned after CTrackpadBridge, then distributed by SwiftBridge.</text>

  <rect x="72" y="255" width="350" height="210" rx="18" class="card blue"/>
  <text x="94" y="287" class="eyebrow blueText">MACOS PRIVATE API</text>
  <text x="94" y="321" class="cardTitle">Raw contact frame</text>
  <text x="94" y="348" class="file">MultitouchSupport.framework</text>
  <text x="94" y="383" class="body"><tspan x="94">Produces TXMTFinger[] containing every</tspan><tspan x="94" dy="23">currently active trackpad contact.</tspan></text>

  <path d="M422 360 H472" class="connector"/>
  <rect x="480" y="255" width="350" height="210" rx="18" class="card blue"/>
  <text x="502" y="287" class="eyebrow blueText">C LISTENER</text>
  <text x="502" y="321" class="cardTitle">Reduce the raw frame</text>
  <text x="502" y="348" class="file">driftMultitouch.c / .h</text>
  <text x="502" y="380" class="body"><tspan x="502">Copies stable contact fields and derives</tspan><tspan x="502" dy="22">center, scale, rotation, frame and phase.</tspan><tspan x="502" dy="22">Emits TXMTTrackpadSnapshot.</tspan></text>

  <path d="M830 360 H880" class="connector"/>
  <rect x="888" y="255" width="350" height="210" rx="18" class="card purple"/>
  <text x="910" y="287" class="eyebrow purpleText">C TO SWIFT BOUNDARY</text>
  <text x="910" y="321" class="cardTitle">Own the snapshot</text>
  <text x="910" y="348" class="file">CTrackpadBridge.swift</text>
  <text x="910" y="380" class="body"><tspan x="910">Copies borrowed pointers into Swift-owned</tspan><tspan x="910" dy="22">FingerContact[] and TrackpadSnapshot.</tspan><tspan x="910" dy="22">C memory never escapes the callback.</tspan></text>

  <path d="M1238 360 H1288" class="connector"/>
  <rect x="1296" y="255" width="386" height="210" rx="18" class="card purple"/>
  <text x="1318" y="287" class="eyebrow purpleText">SWIFT ORCHESTRATION</text>
  <text x="1318" y="321" class="cardTitle">Distribute one frame</text>
  <text x="1318" y="348" class="file">SwiftBridge.swift</text>
  <text x="1318" y="380" class="body"><tspan x="1318">Runs listener processing synchronously,</tspan><tspan x="1318" dy="22">updates suppression, then delivers logging</tspan><tspan x="1318" dy="22">and frontend state on the main actor.</tspan></text>

  <!-- fan out -->
  <path d="M1489 465 V515 M253 515 H1500" class="bus"/>
  <path d="M253 515 V555" class="connector"/>
  <path d="M676 515 V555" class="connector"/>
  <path d="M1099 515 V555" class="connector"/>
  <path d="M1500 515 V555" class="connector"/>

  <rect x="72" y="563" width="362" height="245" rx="18" class="card purple"/>
  <text x="94" y="595" class="eyebrow purpleText">RECOGNITION</text>
  <text x="94" y="629" class="cardTitle">ListenerPipeline.swift</text>
  <text x="94" y="660" class="body"><tspan x="94">Calls listeners in order; handles stop</tspan><tspan x="94" dy="21">propagation, claims, cancellation and reset</tspan><tspan x="94" dy="21">delivery.</tspan></text>
  <rect x="94" y="735" width="318" height="48" rx="10" fill="#211c30"/>
  <text x="253" y="755" text-anchor="middle" class="small"><tspan x="253">AppDelegate passes listeners: []</tspan><tspan x="253" dy="17">so no gestures run.</tspan></text>

  <rect x="495" y="563" width="362" height="245" rx="18" class="card purple"/>
  <text x="517" y="595" class="eyebrow purpleText">OS INTERFERENCE</text>
  <text x="517" y="629" class="cardTitle">EventSuppressionController.swift</text>
  <text x="517" y="660" class="body"><tspan x="517">Owns the CGEvent tap. Removes only the</tspan><tspan x="517" dy="21">requested scroll axis and direction, or</tspan><tspan x="517" dy="21">consumes requested press events.</tspan></text>
  <rect x="517" y="735" width="318" height="48" rx="10" fill="#211c30"/>
  <text x="676" y="755" text-anchor="middle" class="small"><tspan x="676">No listener requests suppression</tspan><tspan x="676" dy="17">in the current build.</tspan></text>

  <rect x="918" y="563" width="362" height="245" rx="18" class="card green"/>
  <text x="940" y="595" class="eyebrow greenText">TESTING STATE</text>
  <text x="940" y="629" class="cardTitle">ActivityLogStore.swift</text>
  <text x="940" y="660" class="body"><tspan x="940">Stores up to 300 entries and samples raw</tspan><tspan x="940" dy="21">frames, contacts, derived values, listener</tspan><tspan x="940" dy="21">states and interaction claims.</tspan></text>
  <rect x="940" y="735" width="318" height="48" rx="10" fill="#102820"/>
  <text x="1099" y="755" text-anchor="middle" class="small"><tspan x="1099">LoggingView.swift observes this store</tspan><tspan x="1099" dy="17">inside the live NSWindow.</tspan></text>

  <rect x="1341" y="563" width="341" height="245" rx="18" class="card green"/>
  <text x="1363" y="595" class="eyebrow greenText">FRONTEND STATE</text>
  <text x="1363" y="629" class="cardTitle">HUDStore.swift</text>
  <text x="1363" y="660" class="body"><tspan x="1363">Stores active HUD IDs, custom state, and</tspan><tspan x="1363" dy="21">the latest TrackpadState used by future</tspan><tspan x="1363" dy="21">HudDefinition implementations.</tspan></text>
  <rect x="1363" y="735" width="297" height="48" rx="10" fill="#102820"/>
  <text x="1511" y="755" text-anchor="middle" class="small"><tspan x="1511">No concrete HUD exists and</tspan><tspan x="1511" dy="17">activeHUDs remains empty.</tspan></text>

  <!-- listener contract -->
  <rect x="45" y="890" width="1710" height="405" rx="26" class="section"/>
  <text x="72" y="935" class="sectionTitle">2. How a future listener plugs in</text>
  <text x="72" y="962" class="subtitle">Each gesture gets one file in Listeners/ and returns a decision for every snapshot.</text>

  <rect x="72" y="1005" width="390" height="225" rx="18" class="card purple"/>
  <text x="94" y="1037" class="eyebrow purpleText">PER-LISTENER FILE</text>
  <text x="94" y="1071" class="cardTitle">struct SomeGesture: Listener</text>
  <text x="94" y="1099" class="file">Input/Listeners/SomeGesture.swift</text>
  <text x="94" y="1132" class="body"><tspan x="94">Owns GestureStatus and evaluates every</tspan><tspan x="94" dy="22">TrackpadSnapshot in onStateChange.</tspan><tspan x="94" dy="22">The folder is currently empty.</tspan></text>

  <path d="M462 1117 H512" class="connector"/>
  <rect x="520" y="1005" width="360" height="225" rx="18" class="card purple"/>
  <text x="542" y="1037" class="eyebrow purpleText">LISTENER OUTPUT</text>
  <text x="542" y="1071" class="cardTitle">ListenerDecision</text>
  <text x="542" y="1099" class="file">ListenerModels.swift</text>
  <text x="542" y="1132" class="body"><tspan x="542">A synchronous value describing what the</tspan><tspan x="542" dy="22">pipeline should do for the current frame.</tspan></text>

  <path d="M880 1117 H930" class="connector"/>
  <rect x="938" y="1005" width="360" height="101" rx="14" fill="#211c30" stroke="#60468d"/>
  <text x="958" y="1035" class="decisionTitle">stopPropagation</text>
  <text x="958" y="1061" class="small"><tspan x="958">Do not call later listeners</tspan><tspan x="958" dy="18">for this frame.</tspan></text>
  <rect x="1320" y="1005" width="362" height="101" rx="14" fill="#211c30" stroke="#60468d"/>
  <text x="1340" y="1035" class="decisionTitle">claimInteraction</text>
  <text x="1340" y="1061" class="small"><tspan x="1340">Cancel competing possible listeners;</tspan><tspan x="1340" dy="18">reserve the contact sequence.</tspan></text>
  <rect x="938" y="1129" width="360" height="101" rx="14" fill="#211c30" stroke="#60468d"/>
  <text x="958" y="1159" class="decisionTitle">suppressions</text>
  <text x="958" y="1185" class="small"><tspan x="958">Request scroll axis/direction</tspan><tspan x="958" dy="18">or press suppression.</tspan></text>
  <rect x="1320" y="1129" width="362" height="101" rx="14" fill="#211c30" stroke="#60468d"/>
  <text x="1340" y="1159" class="decisionTitle">emittedEvents</text>
  <text x="1340" y="1185" class="small"><tspan x="1340">Send typed BackendEvent values;</tspan><tspan x="1340" dy="18">the enum is currently empty.</tspan></text>

  <!-- dormant quick actions -->
  <rect x="45" y="1325" width="1710" height="365" rx="26" class="section"/>
  <text x="72" y="1370" class="sectionTitle">3. Compiled but dormant Quick Actions files</text>
  <text x="72" y="1397" class="subtitle">These are retained frontend prototypes. No listener, HudDefinition, or AppDelegate path reaches them.</text>

  <rect x="72" y="1440" width="450" height="185" rx="18" class="grey"/>
  <text x="94" y="1472" class="eyebrow greyText">OPTIONAL DATA SOURCE</text>
  <text x="94" y="1506" class="cardTitle">ClipboardHistoryStore.swift</text>
  <text x="94" y="1538" class="body"><tspan x="94">Would poll NSPasteboard every 0.5 seconds</tspan><tspan x="94" dy="22">and retain twelve items. start() is never called.</tspan></text>

  <path d="M522 1532 H572" class="connector"/>
  <rect x="580" y="1440" width="420" height="185" rx="18" class="grey"/>
  <text x="602" y="1472" class="eyebrow greyText">DORMANT MODELS</text>
  <text x="602" y="1506" class="cardTitle">QuickActionModels.swift</text>
  <text x="602" y="1538" class="body"><tspan x="602">Defines clipboard and emoji sections, items,</tspan><tspan x="602" dy="22">flow direction and masonry placement.</tspan></text>

  <path d="M1000 1532 H1050" class="connector"/>
  <rect x="1058" y="1440" width="624" height="185" rx="18" class="grey"/>
  <text x="1080" y="1472" class="eyebrow greyText">DORMANT SWIFTUI</text>
  <text x="1080" y="1506" class="cardTitle">QuickActionSurface + ClipboardHistoryView + EmojiPickerView</text>
  <text x="1080" y="1538" class="body"><tspan x="1080">Renderable components, but QuickActions/HUDs is empty.</tspan><tspan x="1080" dy="22">Nothing creates, presents, or updates these views.</tspan></text>

  <rect x="72" y="1650" width="1610" height="1" fill="#34384a"/>
  <circle cx="92" cy="1720" r="7" fill="#66a7ff"/><text x="110" y="1725" class="small">C and private macOS boundary</text>
  <circle cx="430" cy="1720" r="7" fill="#b48cff"/><text x="448" y="1725" class="small">Swift input infrastructure</text>
  <circle cx="775" cy="1720" r="7" fill="#68d9a0"/><text x="793" y="1725" class="small">Observable frontend and testing state</text>
  <circle cx="1215" cy="1720" r="7" fill="#9298a8"/><text x="1233" y="1725" class="small">Compiled but disconnected files</text>
</svg>
